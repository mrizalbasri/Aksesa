name: aksesa
metadata:
  template: azd-init

services:
  web:
    project: ./frontend
    language: js
    host: appservice
  api:
    project: ./backend
    language: python
    host: appservice

hooks:
  postprovision:
    posix:
      shell: sh
      run: ./scripts/grant-sql-access.sh
    windows:
      shell: pwsh
      run: ./scripts/grant-sql-access.ps1
